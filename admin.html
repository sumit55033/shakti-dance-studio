<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shakti Dance Studio - Admin Panel</title>

<style>
.filter-btn{
    background:#222;
}

.filter-btn:hover{
    background:#444;
}
.edit-btn{
    background: orange;
}

.edit-btn:hover{
    background: darkorange;
}

body{
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 30px;
}

h1{
    text-align: center;
}

/* Dashboard Cards */

.dashboard{
    display: flex;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.card-box{
    background: #222;
    color: white;
    padding: 25px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
}

.card-box h3{
    color: #FFD700;
}

/* Search Box */

#searchInput{
    width: 300px;
    padding: 10px;
    margin: 20px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* Table */

table{
    width: 100%;
    border-collapse: collapse;
    background: white;
    margin-top: 20px;
}

th, td{
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

th{
    background: black;
    color: white;
}

/* Buttons */

button{
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
    margin: 2px;
}

/* WhatsApp Button */

.whatsapp-btn{
    background: #25D366;
}

.whatsapp-btn:hover{
    background: #1da851;
}

/* Delete Button */

.delete-btn{
    background: red;
}

.delete-btn:hover{
    background: darkred;
}

/* Export Button */

.export-btn{
    background: green;
}

.export-btn:hover{
    background: darkgreen;
}

</style>

</head>

<body>

<h1>Shakti Dance Studio Admin Panel</h1>

<!-- Dashboard -->

<div class="dashboard">

    <div class="card-box">
        <h3>Total Bookings</h3>
        <h1 id="totalBookings">0</h1>
    </div>

    <div class="card-box">
        <h3>Total Courses</h3>
        <h1>8</h1>
    </div>
    <div style="background:white;padding:20px;border-radius:15px;margin-top:20px;">
    <canvas id="courseChart"></canvas>
    </div>

</div>
<div style="margin:20px 0;">
    <button class="filter-btn" onclick="filterToday()">Today</button>
    <button class="filter-btn" onclick="filterThisWeek()">This Week</button>
    <button class="filter-btn" onclick="filterThisMonth()">This Month</button>
    <button class="filter-btn" onclick="showAll()">Show All</button>
</div>

<!-- Search -->

<input
type="text"
id="searchInput"
placeholder="Search by Name or Mobile"
onkeyup="searchData()">

<!-- Buttons -->

<button class="export-btn" onclick="exportToExcel()">
Export to Excel
</button>

<button onclick="logout()">
Logout
</button>

<!-- Table -->

<table>

    <thead>

        <tr>
            <th>Name</th>
            <th>Mobile</th>
            <th>Course</th>
            <th>Date</th>
            <th>Action</th>
        </tr>

    </thead>

    <tbody id="tableData">

    </tbody>

</table>

<script src="admin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
